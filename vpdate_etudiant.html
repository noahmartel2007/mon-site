<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier Étudiant - BTS CIEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 30px; background-color: #f8f9fa; }
        .container-form { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 10px; shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container-form shadow-sm">
    <h3 class="text-center mb-4">Détails de l'étudiant</h3>
    
    <div class="mb-3">
        <label class="form-label">ID Étudiant :</label>
        <input type="text" id="id_display" class="form-control" disabled>
    </div>

    <div class="mb-3">
        <label class="form-label">Nom :</label>
        <input type="text" id="nom" class="form-control">
    </div>
    
    <div class="mb-3">
        <label class="form-label">Prénom :</label>
        <input type="text" id="prenom" class="form-control">
    </div>
    
    <div class="mb-3">
        <label class="form-label">Email :</label>
        <input type="email" id="email" class="form-control">
    </div>
    
    <hr>
    
    <div class="d-grid gap-2">
        <button type="button" class="btn btn-warning fw-bold" onclick="updateEtudiant()">Enregistrer les modifications</button>
        <button type="button" class="btn btn-outline-danger" onclick="deleteEtudiant()">Supprimer cet étudiant</button>
        <button type="button" class="btn btn-secondary" onclick="window.location.href='./index.html'">Retour à la liste</button>
    </div>
</div>

<script>
    var urlParams = new URLSearchParams(window.location.search);
    var id = urlParams.get("id");
    var url_api_base = 'http://192.168.1.224/ciel2027/api/etudiants.php';

    if (id) {
        document.getElementById("id_display").value = id;
        var req = new XMLHttpRequest();
        req.open("GET", url_api_base + '?id=' + id, true);
        req.send();

        req.onload = function() {
            if (req.status === 200) {
                var etudiant = JSON.parse(req.responseText);
                document.getElementById("nom").value = etudiant.nom;
                document.getElementById("prenom").value = etudiant.prenom;
                document.getElementById("email").value = etudiant.email;
            }
        };
    }

    function updateEtudiant() {
        var data = {
            "id": id,
            "nom": document.getElementById("nom").value,
            "prenom": document.getElementById("prenom").value,
            "email": document.getElementById("email").value
        };

        var req = new XMLHttpRequest();
        req.open("PUT", url_api_base + '?id=' + id, true);
        req.setRequestHeader('Content-Type', 'application/json');
        
        req.onload = function() {
            if (req.status === 200) {
                alert("Étudiant mis à jour !");
                window.location.href = 'index.html';
            }
        };
        req.send(JSON.stringify(data));
    }

    function deleteEtudiant() {
        if (confirm("Voulez-vous vraiment supprimer cet étudiant ?")) {
            var req = new XMLHttpRequest();
            req.open("DELETE", url_api_base + '?id=' + id, true);
            
            req.onload = function() {
                if (req.status === 200) {
                    alert("Étudiant supprimé.");
                    window.location.href = 'index.html';
                }
            };
            req.send();
        }
    }
</script>

</body>
</html>
