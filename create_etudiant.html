<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscrire un étudiant - BTS CIEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 30px; background-color: #f8f9fa; }
        .container-form { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container-form">
    <h3 class="text-center mb-4">Nouvel Étudiant</h3>
    
    <div class="mb-3">
        <label class="form-label">Nom :</label>
        <input type="text" id="nom" class="form-control" placeholder="Ex: MARTIN">
    </div>
    
    <div class="mb-3">
        <label class="form-label">Prénom :</label>
        <input type="text" id="prenom" class="form-control" placeholder="Ex: Jean">
    </div>
    
    <div class="mb-3">
        <label class="form-label">Email :</label>
        <input type="email" id="email" class="form-control" placeholder="jean.martin@email.com">
    </div>
    
    <hr>
    
    <div class="d-grid gap-2">
        <button type="button" class="btn btn-primary fw-bold" onclick="createEtudiant()">Enregistrer l'étudiant</button>
        <button type="button" class="btn btn-secondary" onclick="window.location.href='./index.html'">Annuler et retour</button>
    </div>
</div>

<script>
    function createEtudiant() {

        var nom = document.getElementById("nom").value;
        var prenom = document.getElementById("prenom").value;
        var email = document.getElementById("email").value;

        if (nom === "" || prenom === "" || email === "") {
            alert("Veuillez remplir tous les champs avant d'enregistrer.");
            return;
        }

        var data = {
            "nom": nom,
            "prenom": prenom,
            "email": email
        };

    
        var req = new XMLHttpRequest();
        var url_api = 'http://192.168.1.224/ciel2027/api/etudiants.php';
        
        req.open("POST", url_api, true);
        req.setRequestHeader('Content-Type', 'application/json');
        
        req.onload = function() {
         
            if (req.status === 201 || req.status === 200) {
                alert("L'étudiant a été ajouté avec succès !");
                window.location.href = 'index.html'; 
            } else {
                alert("Erreur lors de la création de l'étudiant.");
            }
        };

        req.send(JSON.stringify(data));
    }
</script>

</body>
</html>
